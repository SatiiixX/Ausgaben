<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Daten-Wiederherstellung</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c12;color:#dde1ec;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px;font-size:15px}
h1{font-size:17px;font-weight:700;margin-bottom:6px;color:#3ddc84}
.sub{font-size:12px;color:#7a8099;margin-bottom:20px;line-height:1.5}
.card{background:#10131e;border:1px solid rgba(255,255,255,.1);border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.db-name{font-size:14px;font-weight:600}
.db-meta{font-size:11px;color:#7a8099;margin-top:2px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;background:rgba(61,220,132,.15);color:#3ddc84;border:1px solid rgba(61,220,132,.25)}
.badge.empty{background:rgba(255,255,255,.06);color:#3a3f55;border-color:transparent}
.btn{display:block;width:100%;padding:12px;background:#3ddc84;color:#0a0c12;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
.btn:active{opacity:.8}
.btn.sec{background:#1e2335;color:#dde1ec;border:1px solid rgba(255,255,255,.1)}
.btn.dan{background:rgba(224,85,85,.15);color:#e05555;border:1px solid rgba(224,85,85,.25)}
.status{padding:14px;font-size:13px;color:#7a8099;text-align:center}
.entry-preview{padding:8px 14px 12px;border-top:1px solid rgba(255,255,255,.06)}
.ep-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.ep-item:last-child{border:none}
.ep-key{color:#7a8099}
.ep-val{font-weight:500}
.result{background:#1e2335;border:1px solid rgba(61,220,132,.3);border-radius:10px;padding:14px;margin-bottom:12px;font-size:13px;line-height:1.6}
.result.err{border-color:rgba(224,85,85,.3);background:rgba(224,85,85,.05)}
.warn{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.25);border-radius:8px;padding:10px 12px;font-size:12px;color:#f0a500;margin-bottom:16px;line-height:1.5}
#log{font-size:11px;color:#3a3f55;margin-top:8px;line-height:1.7}
</style>
</head>
<body>

<h1>&#128640; Daten-Wiederherstellung</h1>
<p class="sub">Dieses Tool scannt alle Datenbanken auf deinem Gerät und stellt deine Ausgaben-Daten wieder her.</p>

<div class="warn">&#9888;&#65039; Öffne dieses Tool auf demselben Gerät und Browser, auf dem du die App benutzt hast (Chrome auf Android).</div>

<div id="main"><div class="status">Scanne Datenbanken&#8230;</div></div>

<script>
const TARGET_DB = 'ag7';
const KNOWN = ['ag6','ag5','ag4','ausgaben5','ausgaben4','ausgaben3','ausgaben_db_v2','ausgaben_db','ausgaben-tracker','tracker','mydb','app'];

function eur(n){return(+n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+'€'}

function log(msg){
  const el=document.getElementById('log');
  if(el)el.innerHTML+=msg+'<br>';
}

async function readDB(name){
  return new Promise((ok,fail)=>{
    const req=indexedDB.open(name);
    let isNew=false;
    req.onupgradeneeded=()=>{isNew=true};
    req.onerror=()=>fail(new Error('cannot open '+name));
    req.onsuccess=e=>{
      const db=e.target.result;
      if(isNew){db.close();fail(new Error('new/empty'));return}
      const stores=[...db.objectStoreNames];
      if(!stores.includes('entries')){db.close();fail(new Error('no entries store'));return}
      const result={entries:[],cats:[],da:[],budgets:null,income:null,stores};
      let pending=0;
      ['entries','cats','da','settings'].forEach(s=>{
        if(!stores.includes(s))return;
        pending++;
        const q=db.transaction(s).objectStore(s).getAll();
        q.onsuccess=()=>{
          if(s==='settings'){
            (q.result||[]).forEach(r=>{
              if(r.k==='budgets'||r.key==='budgets')result.budgets=r.value;
              if(r.k==='income'||r.key==='income')result.income=r.value;
            });
          } else result[s]=q.result||[];
          pending--;
          if(pending===0){db.close();ok(result)}
        };
        q.onerror=()=>{pending--;if(pending===0){db.close();ok(result)}};
      });
      if(pending===0){db.close();ok(result)}
    };
  });
}

async function getAllDBNames(){
  const names=new Set(KNOWN);
  // Use indexedDB.databases() if available (Chrome 93+)
  if(typeof indexedDB.databases==='function'){
    try{
      const dbs=await indexedDB.databases();
      dbs.forEach(d=>{if(d.name)names.add(d.name)});
    }catch(e){}
  }
  return [...names];
}

async function openTargetDB(){
  return new Promise((ok,fail)=>{
    const req=indexedDB.open(TARGET_DB,1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      ['entries','cats','da'].forEach(s=>{
        if(!d.objectStoreNames.contains(s))
          d.createObjectStore(s,{keyPath:'id',autoIncrement:true});
      });
      if(!d.objectStoreNames.contains('settings'))
        d.createObjectStore('settings',{keyPath:'k'});
    };
    req.onsuccess=e=>{ok(e.target.result)};
    req.onerror=()=>fail(req.error);
  });
}

async function restoreInto(targetDB, data){
  // Clear existing
  for(const s of['entries','cats','da','settings']){
    await new Promise(r=>{targetDB.transaction(s,'readwrite').objectStore(s).clear().onsuccess=()=>r()});
  }
  // Write entries
  for(const e of data.entries){
    const{id,...rest}=e;
    await new Promise(r=>{const q=targetDB.transaction('entries','readwrite').objectStore('entries').add(rest);q.onsuccess=()=>r()});
  }
  // Write cats
  for(const c of data.cats){
    const{id,...rest}=c;
    if(!rest.subsubs)rest.subsubs={};
    await new Promise(r=>{const q=targetDB.transaction('cats','readwrite').objectStore('cats').add(rest);q.onsuccess=()=>r()});
  }
  // Write da
  for(const d of data.da||[]){
    const{id,...rest}=d;
    await new Promise(r=>{const q=targetDB.transaction('da','readwrite').objectStore('da').add(rest);q.onsuccess=()=>r()});
  }
  // Write settings
  if(data.budgets){
    await new Promise(r=>{targetDB.transaction('settings','readwrite').objectStore('settings').put({k:'budgets',value:data.budgets}).onsuccess=()=>r()});
  }
  if(data.income!=null){
    await new Promise(r=>{targetDB.transaction('settings','readwrite').objectStore('settings').put({k:'income',value:data.income}).onsuccess=()=>r()});
  }
}

async function scan(){
  const main=document.getElementById('main');
  main.innerHTML='<div class="status">Scanne ' + KNOWN.length + ' bekannte Datenbanken&#8230;</div><div id="log"></div>';

  const names=await getAllDBNames();
  log('Gefundene DB-Namen: '+names.join(', '));

  const found=[];
  for(const name of names){
    if(name===TARGET_DB)continue;
    try{
      log('Prüfe: '+name+'&#8230;');
      const data=await readDB(name);
      if(data.entries.length>0||data.cats.length>0){
        found.push({name,data});
        log('<span style="color:#3ddc84">✓ '+name+': '+data.entries.length+' Einträge</span>');
      }
    }catch(e){
      log('– '+name+': '+e.message);
    }
  }

  if(found.length===0){
    main.innerHTML=`
      <div class="result err">
        <strong>Keine Daten gefunden.</strong><br><br>
        Mögliche Ursachen:<br>
        • Du verwendest einen anderen Browser als vorher<br>
        • Der Browser-Cache wurde geleert<br>
        • Die App war im Inkognito-Modus<br><br>
        Falls du ein JSON-Backup hast, kannst du es über den Import-Button (↑) in der App laden.
      </div>
      <div id="log"></div>`;
    return;
  }

  let html='';
  for(const{name,data} of found){
    const total=data.entries.reduce((s,e)=>s+(e.betrag||0),0);
    const months=[...new Set(data.entries.map(e=>e.datum?.slice(0,7)||''))].filter(Boolean).sort();
    const first=months[0]||'–';
    const last=months[months.length-1]||'–';
    html+=`<div class="card">
      <div class="card-head">
        <div>
          <div class="db-name">Datenbank: <code style="color:#29c5d4">${name}</code></div>
          <div class="db-meta">${data.entries.length} Einträge &nbsp;·&nbsp; ${data.cats.length} Kategorien &nbsp;·&nbsp; ${(data.da||[]).length} Daueraufträge</div>
        </div>
        <div class="badge">${data.entries.length} Eintr.</div>
      </div>
      <div class="entry-preview">
        <div class="ep-item"><span class="ep-key">Erster Eintrag</span><span class="ep-val">${first}</span></div>
        <div class="ep-item"><span class="ep-key">Letzter Eintrag</span><span class="ep-val">${last}</span></div>
        <div class="ep-item"><span class="ep-key">Gesamtbetrag</span><span class="ep-val">${eur(total)}</span></div>
        <div class="ep-item"><span class="ep-key">Gehalt hinterlegt</span><span class="ep-val">${data.income?eur(data.income):'–'}</span></div>
        ${data.entries.slice(0,3).map(e=>`<div class="ep-item"><span class="ep-key">${e.datum||''} · ${e.haupt||''}</span><span class="ep-val">${eur(e.betrag||0)}</span></div>`).join('')}
        <button class="btn" onclick="restore('${name}')">&#10003; Diese Daten wiederherstellen</button>
      </div>
    </div>`;
  }

  main.innerHTML=`
    <div class="result">
      <strong>&#127881; ${found.length} Datenbank${found.length>1?'en':''} mit Daten gefunden!</strong><br>
      Tippe auf "Wiederherstellen" um die Daten in die aktuelle App zu übertragen.
    </div>
    ${html}
    <div id="log"></div>`;

  // Store found data globally for restore
  window._foundData={};
  for(const{name,data} of found)window._foundData[name]=data;
}

async function restore(dbName){
  const data=window._foundData?.[dbName];
  if(!data){alert('Daten nicht gefunden.');return}

  document.getElementById('main').innerHTML='<div class="status">Stelle Daten wieder her&#8230;</div>';

  try{
    const targetDB=await openTargetDB();
    await restoreInto(targetDB,data);
    targetDB.close();

    document.getElementById('main').innerHTML=`
      <div class="result">
        <strong>&#10003; Wiederherstellung erfolgreich!</strong><br><br>
        ${data.entries.length} Einträge wurden in die App übertragen.<br><br>
        <strong>Nächster Schritt:</strong> Gehe zurück zur App und lade sie neu.
      </div>
      <a href="index.html" style="display:block;padding:13px;background:#3ddc84;color:#0a0c12;border-radius:8px;text-align:center;font-weight:700;text-decoration:none;font-size:14px">&#8594; Zur App</a>`;
  }catch(err){
    document.getElementById('main').innerHTML=`
      <div class="result err"><strong>Fehler:</strong> ${err.message}</div>
      <button class="btn" onclick="scan()">Erneut versuchen</button>`;
  }
}

scan();
</script>
</body>
</html>
